name: Deploy Shopify Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target theme"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      confirm_production:
        description: "Set true when production deploy is approved"
        required: false
        default: false
        type: boolean

concurrency:
  group: shopify-theme-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Validate required secrets (staging)
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID_STAGING }}
        run: |
          test -n "$SHOPIFY_FLAG_STORE" || (echo "Missing secret: SHOPIFY_STORE" && exit 1)
          test -n "$SHOPIFY_CLI_THEME_TOKEN" || (echo "Missing secret: SHOPIFY_CLI_THEME_TOKEN" && exit 1)
          test -n "$SHOPIFY_THEME_ID" || (echo "Missing secret: SHOPIFY_THEME_ID_STAGING" && exit 1)

      - name: Push theme to Shopify (staging)
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID_STAGING }}
        run: |
          shopify theme push \
            --theme "$SHOPIFY_THEME_ID" \
            --path . \
            --nodelete

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - name: Validate production confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_production }}" != "true" ]; then
            echo "Production deploy requires confirm_production=true"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Validate required secrets (production)
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID_PRODUCTION }}
        run: |
          test -n "$SHOPIFY_FLAG_STORE" || (echo "Missing secret: SHOPIFY_STORE" && exit 1)
          test -n "$SHOPIFY_CLI_THEME_TOKEN" || (echo "Missing secret: SHOPIFY_CLI_THEME_TOKEN" && exit 1)
          test -n "$SHOPIFY_THEME_ID" || (echo "Missing secret: SHOPIFY_THEME_ID_PRODUCTION" && exit 1)

      - name: Push theme to Shopify (production)
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID_PRODUCTION }}
          SHOPIFY_ALLOW_LIVE: ${{ secrets.SHOPIFY_ALLOW_LIVE_PRODUCTION }}
        run: |
          LIVE_FLAG=""
          if [ "$SHOPIFY_ALLOW_LIVE" = "true" ]; then
            LIVE_FLAG="--allow-live"
          fi

          shopify theme push \
            --theme "$SHOPIFY_THEME_ID" \
            --path . \
            --nodelete \
            $LIVE_FLAG
